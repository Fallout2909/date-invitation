<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Date?</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">

        <!-- Step 1: Question Screen -->
        <div id="step1">
            <h1>Missyelin…</h1>

            <p style="margin-top:15px;">
                Can I take you out on an another date?
            </p>

            <button onclick="goToStep2()">Yes 😌</button>
            <button id="thinkBtn" onclick="playfulNo()" style="margin-top:10px; background:#ddd; color:#333;">
                Let me think 🤔
            </button>
        </div>


        <!-- Step 2: Date Selection (Hidden Initially) -->
        <div id="step2" style="display:none;">

            <h1>Our Second Date 💕</h1>

            <label>Select your preferred date:</label>
            <input type="date" id="date">

            <label>Select your preferred time:</label>
            <input type="time" id="time">

            <label>Anything I should know? 👀</label>
            <textarea id="message"></textarea>

            <button onclick="submitForm()">Lock it your answer</button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
