<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Date hehe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">

        <!-- STEP 1 -->
        <div id="step1">
            <h1>Missyelin…</h1>

            <p style="margin-top:15px;">
                Since I didn't properly planned our first date, can I make it up to you by planning our second date?
            </p>

            <p>
                Can I officially take you out this time?
            </p>

            <button onclick="goToStep2()">Yes 😌</button>

            <button id="thinkBtn" onclick="playfulNo()" style="margin-top:10px; background:#eee; color:#333;">
                Let me think 🤔
            </button>
        </div>

        <!-- STEP 2 -->
        <div id="step2" style="display:none;">

            <h1>Let's plan this properly</h1>

            <label>Pick a date:</label>
            <input type="date" id="date">

            <label>What time works for you?</label>
            <div class="time-range">
                <input type="time" id="startTime">
                <span>to</span>
                <input type="time" id="endTime">
            </div>

            <!-- Activities section -->
            <label>What should we do? 👀 (You can pick more than one)</label>

            <div class="activities-grid">
                <label class="activity-card">
                    <input type="checkbox" value="Sunset 🌅" class="activity">
                    🌅 Sunset
                </label>

                <label class="activity-card">
                    <input type="checkbox" value="Snooker 🎱" class="activity">
                    🎱 Snooker
                </label>

                <label class="activity-card">
                    <input type="checkbox" value="Café ☕" class="activity">
                    ☕ Café
                </label>

                <label class="activity-card">
                    <input type="checkbox" value="Movie 🎬" class="activity">
                    🎬 Movie
                </label>

                <label class="activity-card">
                    <input type="checkbox" value="Movie 🎬" class="activity">
                    🏔 Hiking
                </label>

                <label class="activity-card">
                    <input type="checkbox" value="Movie 🎬" class="activity">
                    🐱 Cat Cafe
                </label>
            </div>

            <label>Have something else in mind? 💡</label>
                <input type="text" id="activitySuggestion" placeholder="Bowling? Arcade? Art gallery? 😌">

                <!-- Food section -->
                <label>Which one you prefer or you want both?</label>
                <div class="activities-grid">
                    <label class="activity-card">
                        <input type="checkbox" value="Lunch 🍽" class="activity">
                        🍽 Lunch
                    </label>

                    <label class="activity-card">
                        <input type="checkbox" value="Dinner 🍝" class="activity">
                        🍝 Dinner
                    </label>
                </div>

            <label>What are you craving? 🍜</label>
            <input type="text" id="foodSuggestion" placeholder="Indonesian, Japanese, Ayam Gepuk? haha">


            <!-- Message section -->
            <label>Anything else you want me to know? 💭</label>
            <textarea id="message" placeholder="Share your thoughts, you can leave it blank too"></textarea>

            <button onclick="submitForm()">Yippe hehe</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
