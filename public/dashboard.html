<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Dashboard 💌</title>
    <link rel="stylesheet" href="dashboard.css">

</head>

<body>

    <div class="container">

        <div class="panel">
            <h1>Latest Response 💌</h1>
            <div id="latest">Loading...</div>
        </div>

        <div class="panel">
            <h1>Full History 📜</h1>
            <div id="history" class="history-list">Loading...</div>
        </div>

    </div>

    <script>
        function formatEntry(item) {

            if (item.status === "rejected") {
                return `
            <div class="history-item rejected">
                <strong>❌ Rejected</strong>
                <div class="timestamp">
                    ${new Date(item.timestamp).toLocaleString()}
                </div>
            </div>
        `;
            }

            return `
        <div class="history-item">
            <strong>Accepted 💕</strong><br><br>

            <strong>Date:</strong> ${item.date || "—"}<br>
            <strong>Availability:</strong> ${item.availability || "—"}<br>

            ${item.startTime && item.endTime
                    ? `<strong>Time Range:</strong> ${item.startTime} - ${item.endTime}<br>`
                    : ""
                }

            <strong>Activities:</strong>
            ${item.activities && item.activities.length
                    ? item.activities.join(", ")
                    : "None"
                }<br>

            ${item.foodSuggestion
                    ? `<strong>Food Suggestion:</strong> ${item.foodSuggestion}<br>`
                    : ""
                }

            ${item.message
                    ? `<strong>Extra Note:</strong> ${item.message}<br>`
                    : ""
                }

            <div class="timestamp">
                ${new Date(item.timestamp).toLocaleString()}
            </div>
        </div>
    `;
        }

        function loadDashboard() {

            fetch("/latest")
                .then(res => res.json())
                .then(data => {
                    if (!data.timestamp) {
                        document.getElementById("latest").innerHTML =
                            "<p>No responses yet 💭</p>";
                        return;
                    }
                    document.getElementById("latest").innerHTML =
                        formatEntry(data);
                });

            fetch("/all")
                .then(res => res.json())
                .then(data => {

                    if (!Array.isArray(data) || !data.length) {
                        document.getElementById("history").innerHTML =
                            "<p>No history yet.</p>";
                        return;
                    }

                    data.sort((a, b) =>
                        new Date(b.timestamp) - new Date(a.timestamp)
                    );

                    document.getElementById("history").innerHTML =
                        data.map(item => formatEntry(item)).join("");
                });
        }

        loadDashboard();
        setInterval(loadDashboard, 3000);
    </script>

</body>

</html>
